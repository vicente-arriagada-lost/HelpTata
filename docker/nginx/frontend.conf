server {
    listen 5000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta no encontrada sirve index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos con hash en el nombre
    location ~* \.(js|css|png|webp|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
