spring.application.name=Usuario
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/helptata_usuario
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info

ms.direccion.url=http://localhost:8084
ms.logs.url=http://localhost:8081

# Datos de prueba (data.sql se ejecuta al iniciar)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT — clave secreta y tiempo de expiración (24 horas = 86400000 ms)
# La clave debe tener al menos 32 caracteres para HMAC-SHA256
# ¡IMPORTANTE! En producción usar una clave larga y aleatoria guardada como variable de entorno
app.jwt.secret=TU_JWT_SECRET_AQUI
app.jwt.expiration=86400000
