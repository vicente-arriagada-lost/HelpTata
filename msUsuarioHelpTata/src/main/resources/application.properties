spring.application.name=Usuario
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/helptata_usuario
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info

ms.direccion.url=http://localhost:8084
ms.logs.url=http://localhost:8081

# Datos de prueba (data.sql se ejecuta al iniciar)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT — clave secreta y tiempo de expiración (24 horas = 86400000 ms)
# La clave debe tener al menos 32 caracteres para HMAC-SHA256
# ¡IMPORTANTE! En producción usar una clave larga y aleatoria guardada como variable de entorno
app.jwt.secret=TU_JWT_SECRET_AQUI
app.jwt.expiration=86400000

# Swagger UI con selector de todos los microservicios
springdoc.swagger-ui.urls[0].name=ms-usuario
springdoc.swagger-ui.urls[0].url=/v3/api-docs/ms-usuario
springdoc.swagger-ui.urls[1].name=ms-logs
springdoc.swagger-ui.urls[1].url=/v3/api-docs/ms-logs
springdoc.swagger-ui.urls[2].name=ms-tutoriales
springdoc.swagger-ui.urls[2].url=/v3/api-docs/ms-tutoriales
springdoc.swagger-ui.urls[3].name=ms-progreso
springdoc.swagger-ui.urls[3].url=/v3/api-docs/ms-progreso
springdoc.swagger-ui.urls[4].name=ms-direccion
springdoc.swagger-ui.urls[4].url=/v3/api-docs/ms-direccion
springdoc.swagger-ui.urls[5].name=ms-evaluaciones
springdoc.swagger-ui.urls[5].url=/v3/api-docs/ms-evaluaciones
springdoc.swagger-ui.urls[6].name=ms-preguntas
springdoc.swagger-ui.urls[6].url=/v3/api-docs/ms-preguntas
