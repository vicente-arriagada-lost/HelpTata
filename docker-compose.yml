version: '3.8'

# ============================================================
# HelpTata — Docker Compose
# Antes de ejecutar:
#   1. Copia .env.docker como .env y rellena SERVER_IP y DB_PASSWORD
#   2. docker-compose up --build -d
# ============================================================

services:

  # ── Base de datos ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: helptata-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Servidor de videos (Nginx — Range requests nativo) ────
  videos-server:
    image: nginx:alpine
    container_name: helptata-videos
    ports:
      - "9000:80"
    volumes:
      - ${VIDEOS_PATH}:/media:ro
      - ./docker/nginx/media.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── Servidor de imágenes ─────────────────────────────────
  imagenes-server:
    image: nginx:alpine
    container_name: helptata-imagenes
    ports:
      - "9001:80"
    volumes:
      - ${IMAGENES_PATH}:/media:ro
      - ./docker/nginx/media.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── ms-Logs (8081) — arrancar primero, el resto depende de él ──
  ms-logs:
    build: ./msLogsHelpTata
    container_name: helptata-logs
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/helptata_logs
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── ms-Dirección (8084) ───────────────────────────────────
  ms-direccion:
    build: ./msDireccionHelpTata
    container_name: helptata-direccion
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/helptata_direccion
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MS_LOGS_URL=http://ms-logs:8081
    depends_on:
      postgres:
        condition: service_healthy
      ms-logs:
        condition: service_started
    restart: unless-stopped

  # ── ms-Usuario (8080) ─────────────────────────────────────
  ms-usuario:
    build: ./msUsuarioHelpTata
    container_name: helptata-usuario
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/helptata_usuario
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MS_LOGS_URL=http://ms-logs:8081
      - MS_DIRECCION_URL=http://ms-direccion:8084
      - APP_JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      ms-logs:
        condition: service_started
      ms-direccion:
        condition: service_started
    restart: unless-stopped

  # ── ms-Tutoriales (8082) ──────────────────────────────────
  ms-tutoriales:
    build: ./msTutorialesHelpTata
    container_name: helptata-tutoriales
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/helptata_tutoriales
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MS_LOGS_URL=http://ms-logs:8081
    depends_on:
      postgres:
        condition: service_healthy
      ms-logs:
        condition: service_started
    restart: unless-stopped

  # ── ms-Progreso (8083) ───────────────────────────────────
  ms-progreso:
    build: ./msProgresoHelpTata
    container_name: helptata-progreso
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/helptata_progreso
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MS_LOGS_URL=http://ms-logs:8081
    depends_on:
      postgres:
        condition: service_healthy
      ms-logs:
        condition: service_started
    restart: unless-stopped

  # ── ms-Evaluaciones (8085) ───────────────────────────────
  ms-evaluaciones:
    build: ./msEvaluacionesHelpTata
    container_name: helptata-evaluaciones
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/helptata_evaluaciones
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MS_LOGS_URL=http://ms-logs:8081
    depends_on:
      postgres:
        condition: service_healthy
      ms-logs:
        condition: service_started
    restart: unless-stopped

  # ── ms-Preguntas y Respuestas (8086) ─────────────────────
  ms-preguntas:
    build: ./msPreguntasYRespuestasHelpTata
    container_name: helptata-preguntas
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/helptata_preguntas
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MS_LOGS_URL=http://ms-logs:8081
      - MS_PROGRESO_URL=http://ms-progreso:8083
    depends_on:
      postgres:
        condition: service_healthy
      ms-logs:
        condition: service_started
      ms-progreso:
        condition: service_started
    restart: unless-stopped

  # ── ms-TataBot (8087) ────────────────────────────────────
  ms-tatabot:
    build: ./msTataBot
    container_name: helptata-tatabot
    ports:
      - "8087:8087"
    environment:
      - MS_LOGS_URL=http://ms-logs:8081
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      ms-logs:
        condition: service_started
    restart: unless-stopped

  # ── Frontend React (5000) ─────────────────────────────────
  frontend:
    build:
      context: ./helptataFront
      args:
        SERVER_IP: ${SERVER_IP}
    container_name: helptata-frontend
    ports:
      - "5000:5000"
    depends_on:
      - ms-usuario
      - ms-tutoriales
    restart: unless-stopped

volumes:
  postgres-data:
