server {
    listen 5000;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy hacia microservicios por ruta ──────────────────────
    # Cada location /api/X reenvía al MS correspondiente.
    # El header Authorization se pasa intacto para JWT.

    # ms-usuario (8080)
    location /api/usuarios    { proxy_pass http://ms-usuario:8080; proxy_set_header Authorization $http_authorization; }
    location /api/emails      { proxy_pass http://ms-usuario:8080; proxy_set_header Authorization $http_authorization; }
    location /api/roles       { proxy_pass http://ms-usuario:8080; proxy_set_header Authorization $http_authorization; }

    # ms-logs (8081)
    location /api/logs        { proxy_pass http://ms-logs:8081;    proxy_set_header Authorization $http_authorization; }

    # ms-tutoriales (8082)
    location /api/tutoriales  { proxy_pass http://ms-tutoriales:8082; proxy_set_header Authorization $http_authorization; }
    location /api/fotos       { proxy_pass http://ms-tutoriales:8082; proxy_set_header Authorization $http_authorization; }
    location /api/config      { proxy_pass http://ms-tutoriales:8082; proxy_set_header Authorization $http_authorization; }

    # ms-progreso (8083)
    location /api/progreso    { proxy_pass http://ms-progreso:8083;   proxy_set_header Authorization $http_authorization; }

    # ms-direccion (8084)
    location /api/direcciones { proxy_pass http://ms-direccion:8084;  proxy_set_header Authorization $http_authorization; }
    location /api/regiones    { proxy_pass http://ms-direccion:8084;  proxy_set_header Authorization $http_authorization; }
    location /api/ciudades    { proxy_pass http://ms-direccion:8084;  proxy_set_header Authorization $http_authorization; }
    location /api/comunas     { proxy_pass http://ms-direccion:8084;  proxy_set_header Authorization $http_authorization; }
    location /api/paises      { proxy_pass http://ms-direccion:8084;  proxy_set_header Authorization $http_authorization; }

    # ms-evaluaciones (8085)
    location /api/evaluaciones  { proxy_pass http://ms-evaluaciones:8085; proxy_set_header Authorization $http_authorization; }

    # ms-preguntas (8086)
    location /api/cuestionarios { proxy_pass http://ms-preguntas:8086; proxy_set_header Authorization $http_authorization; }
    location /api/preguntas     { proxy_pass http://ms-preguntas:8086; proxy_set_header Authorization $http_authorization; }
    location /api/alternativas  { proxy_pass http://ms-preguntas:8086; proxy_set_header Authorization $http_authorization; }
    location /api/resultados    { proxy_pass http://ms-preguntas:8086; proxy_set_header Authorization $http_authorization; }

    # ms-tatabot (8087)
    location /api/tatabot     { proxy_pass http://ms-tatabot:8087;    proxy_set_header Authorization $http_authorization; }

    # ── index.html: nunca cacheado para que siempre llegue el deploy nuevo ──
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── SPA: rutas desconocidas sirven index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache de assets estáticos ─────────────────────────────────
    location ~* \.(js|css|png|webp|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
